name: Reusable - Docker build, push, and sign

on:
  workflow_call:
    inputs:
      image_name:
        description: Image name suffix appended to ghcr.io/<caller-repo>/
        required: true
        type: string
      context:
        description: Docker build context path (relative to repo root)
        required: true
        type: string
      platforms:
        description: Comma-separated list of target platforms
        required: false
        type: string
        default: 'linux/amd64,linux/arm/v7,linux/arm64'
      build_args:
        description: Newline-separated list of Docker build-args (e.g. LIB_BRANCH=develop)
        required: false
        type: string
        default: ''
      registry:
        description: Container registry host
        required: false
        type: string
        default: 'ghcr.io'
    secrets:
      PACKAGES_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for keyless cosign signing via sigstore/fulcio
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v3.0.6'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ inputs.registry }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_TOKEN }}

      # Tags and labels are derived from the git ref.
      # The 'latest' tag is only applied to non-alpha releases.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ github.repository }}/${{ inputs.image_name }}
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/alpha') }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          platforms: ${{ inputs.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build_args }}

      # Signs the published image digest with keyless cosign (sigstore/fulcio).
      # Only runs on non-PR events; writes to the public Rekor transparency log.
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: echo "${{ steps.meta.outputs.tags }}" | xargs -I {} cosign sign --yes {}@${{ steps.build-and-push.outputs.digest }}
