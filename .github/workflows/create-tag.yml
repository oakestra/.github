name: Reusable - Create and push git tag from version file

on:
  workflow_call:
    inputs:
      tag_prefix:
        description: Prefix prepended to the version string (e.g. 'alpha-'). Empty for release tags.
        required: false
        type: string
        default: ''
      version_file:
        description: Path to the file containing the version string
        required: false
        type: string
        default: 'version.txt'
      force:
        description: Force-create and force-push the tag, overwriting it if it already exists. Needed for tags that move on every run (e.g. alpha tags).
        required: false
        type: boolean
        default: false
    secrets:
      PACKAGES_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  create_tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.PACKAGES_TOKEN }}

      - name: Fetch origin
        run: git fetch origin

      - name: Create and push tag
        env:
          VERSION_FILE: ${{ inputs.version_file }}
          TAG_PREFIX: ${{ inputs.tag_prefix }}
          FORCE: ${{ inputs.force }}
        run: |
          version=$(cat "$VERSION_FILE")
          tag="$TAG_PREFIX$version"
          if [ "$FORCE" = "true" ]; then
            git tag -f "$tag"
            git push origin "refs/tags/$tag" --force
          else
            git tag "$tag"
            git push origin "refs/tags/$tag"
          fi
