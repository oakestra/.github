name: OakAssistant Fix 
on:
  workflow_call:
    inputs:
      bot_username:
        type: string
        default: OakAssistant
      environment_name:
        type: string
        default: OakAssistant
      runs_on:
        type: string
        default: '["ubuntu-latest"]'
    secrets:
      AWX_HOST:
        required: true
      AWX_AI_TEMPLATE_ID:
        required: true
      AWX_WEBHOOK_KEY:
        required: true

jobs:
  dispatch:
    if: >-
      (github.event_name == 'issues'              && github.event.action == 'assigned'         && github.event.assignee.login          == inputs.bot_username) ||
      (github.event_name == 'pull_request'        && github.event.action == 'assigned'         && github.event.assignee.login          == inputs.bot_username) ||
      (github.event_name == 'pull_request_target' && github.event.action == 'assigned'         && github.event.assignee.login          == inputs.bot_username) ||
      (github.event_name == 'pull_request'        && github.event.action == 'review_requested' && github.event.requested_reviewer.login == inputs.bot_username) ||
      (github.event_name == 'pull_request_target' && github.event.action == 'review_requested' && github.event.requested_reviewer.login == inputs.bot_username) ||
      (github.event_name == 'issue_comment'       && contains(github.event.comment.body, format('@{0}', inputs.bot_username)))
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    environment: ${{ inputs.environment_name }}
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Determine trigger kind, mode, number, body, and PR head ref
        id: meta
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME:  ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          REPO_FULL:   ${{ github.repository }}
          REPO_SHORT:  ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          # MODE: "review" when the bot was added as a reviewer on a PR;
          #       "implement" for everything else (assignment, @-mention).
          MODE=implement

          if   [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "pull_request_target" ]; then
            KIND=pr
            NUM=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
            BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
            HEAD=$(jq -r '.pull_request.head.ref // ""' "$GITHUB_EVENT_PATH")
            if [ "$EVENT_ACTION" = "review_requested" ]; then
              MODE=review
            fi
          elif [ "$EVENT_NAME" = "issues" ]; then
            KIND=issue
            NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
            BODY=$(jq -r '.issue.body // ""' "$GITHUB_EVENT_PATH")
            HEAD=""
          else
            # issue_comment fires on both issues and PRs. Resolve which.
            IS_PR=$(jq -r '.issue.pull_request // empty' "$GITHUB_EVENT_PATH")
            NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
            BODY=$(jq -r '.issue.body // ""' "$GITHUB_EVENT_PATH")
            if [ -n "$IS_PR" ]; then
              KIND=pr
              HEAD=$(gh pr view "$NUM" --repo "$REPO_FULL" --json headRefName -q .headRefName)
            else
              KIND=issue
              HEAD=""
            fi
          fi

          {
            echo "kind=$KIND"
            echo "mode=$MODE"
            echo "number=$NUM"
            echo "target_repo=$REPO_SHORT"
            echo "target_repo_full=$REPO_FULL"
            echo "pr_head_ref=$HEAD"
          } >>"$GITHUB_OUTPUT"

          # body is multi-line; use a unique heredoc delimiter.
          DELIM="EOF_BODY_$RANDOM"
          {
            echo "body<<$DELIM"
            echo "$BODY"
            echo "$DELIM"
          } >>"$GITHUB_OUTPUT"

          # Pull the full chronological conversation (OP + comments [+ PR reviews]) for AI context.
          if [ "$KIND" = "pr" ]; then
            CONV=$(gh pr view "$NUM" --repo "$REPO_FULL" \
              --json body,author,createdAt,comments,reviews \
              --jq '[
                {kind:"OP",             who:.author.login, when:.createdAt,   text:(.body // "")}
              ] + (.comments // [] | map({kind:"comment",        who:.author.login, when:.createdAt,   text:(.body // "")}))
                 + (.reviews  // [] | map({kind:("review/" + .state), who:.author.login, when:.submittedAt, text:(.body // "")}))
                | sort_by(.when)
                | map("--- [\(.kind) by @\(.who) at \(.when)]\n\(.text)")
                | join("\n\n")')

            # For PRs: scan the body for GitHub closing keywords (fixes/closes/resolves #N)
            # and fetch the linked issues' bodies so the AI has the original context.
            #
            # Build LINKED_BLOCK with $'...' ANSI-C newline escapes (not literal
            # newlines) so any auto-formatter that collapses multi-line strings
            # can't squash the separators.
            LINKED_ISSUES=$(printf '%s' "$BODY" \
              | grep -oiE '\b(close[sd]?|fix(es|ed)?|resolve[sd]?)[[:space:]]+#[0-9]+' \
              | grep -oE '#[0-9]+' \
              | tr -d '#' \
              | sort -un)
            LINKED_BLOCK=""
            for ISSUE_NUM in $LINKED_ISSUES; do
              ISSUE_DATA=$(gh api "repos/${REPO_FULL}/issues/${ISSUE_NUM}" \
                --jq '"#" + (.number|tostring) + " - " + (.title // "") + "\nopened by @" + (.user.login // "?") + " at " + (.created_at // "?") + "\n\n" + (.body // "")' \
                2>/dev/null) || ISSUE_DATA=""
              if [ -n "$ISSUE_DATA" ]; then
                LINKED_BLOCK+=$'--- [LINKED ISSUE #'"${ISSUE_NUM}"$']\n'"${ISSUE_DATA}"$'\n\n'
              fi
            done
            if [ -n "$LINKED_BLOCK" ]; then
              CONV=$(printf '%s\n\n----- LINKED ISSUES (from PR closing keywords: fixes/closes/resolves #N) -----\n%s----- END LINKED ISSUES -----\n' "$CONV" "$LINKED_BLOCK")
            fi
          else
            CONV=$(gh issue view "$NUM" --repo "$REPO_FULL" \
              --json body,author,createdAt,comments \
              --jq '[
                {kind:"OP",      who:.author.login, when:.createdAt, text:(.body // "")}
              ] + (.comments // [] | map({kind:"comment", who:.author.login, when:.createdAt, text:(.body // "")}))
                | sort_by(.when)
                | map("--- [\(.kind) by @\(.who) at \(.when)]\n\(.text)")
                | join("\n\n")')
          fi

          DELIM2="EOF_CONV_$RANDOM"
          {
            echo "conversation<<$DELIM2"
            echo "$CONV"
            echo "$DELIM2"
          } >>"$GITHUB_OUTPUT"

      - name: Launch AWX job template (ai_implement)
        env:
          AWX_HOST:        ${{ secrets.AWX_HOST }}
          TEMPLATE_ID:     ${{ secrets.AWX_AI_TEMPLATE_ID }}
          WEBHOOK_KEY:     ${{ secrets.AWX_WEBHOOK_KEY }}
          KIND:            ${{ steps.meta.outputs.kind }}
          MODE:            ${{ steps.meta.outputs.mode }}
          NUM:             ${{ steps.meta.outputs.number }}
          TGT_REPO:        ${{ steps.meta.outputs.target_repo }}
          TGT_REPO_FULL:   ${{ steps.meta.outputs.target_repo_full }}
          PR_HEAD_REF:     ${{ steps.meta.outputs.pr_head_ref }}
          BODY:            ${{ steps.meta.outputs.body }}
          CONVERSATION:    ${{ steps.meta.outputs.conversation }}
        run: |
          set -euo pipefail
          # All inputs flow in via env vars (declared above) so untrusted
          # issue/PR/comment text cannot break shell quoting or execute
          # arbitrary commands.
          jq -n \
            --arg trigger_kind     "$KIND" \
            --arg trigger_mode     "$MODE" \
            --arg trigger_number   "$NUM" \
            --arg target_repo      "$TGT_REPO" \
            --arg target_repo_full "$TGT_REPO_FULL" \
            --arg pr_head_ref      "$PR_HEAD_REF" \
            --arg body             "$BODY" \
            --arg conversation     "$CONVERSATION" \
            '{extra_vars: {
                trigger_kind:     $trigger_kind,
                trigger_mode:     $trigger_mode,
                trigger_number:   $trigger_number,
                target_repo:      $target_repo,
                target_repo_full: $target_repo_full,
                pr_head_ref:      $pr_head_ref,
                body:             $body,
                conversation:     $conversation
            }}' > payload.json

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WEBHOOK_KEY}" \
            "https://${AWX_HOST}/api/v2/job_templates/${TEMPLATE_ID}/launch/" \
            --data @payload.json --insecure

      - name: Acknowledge on the source issue/PR
        env:
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          KIND:          ${{ steps.meta.outputs.kind }}
          MODE:          ${{ steps.meta.outputs.mode }}
          NUM:           ${{ steps.meta.outputs.number }}
          TGT_REPO_FULL: ${{ steps.meta.outputs.target_repo_full }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "review" ]; then
            gh pr comment "$NUM" \
              --repo "$TGT_REPO_FULL" \
              --body ":robot: OakAssistant AI review dispatched. A review comment will be posted when ready."
          elif [ "$KIND" = "issue" ]; then
            gh issue comment "$NUM" \
              --repo "$TGT_REPO_FULL" \
              --body ":robot: OakAssistant AI fix run dispatched. A draft PR will be opened when ready."
          else
            gh pr comment "$NUM" \
              --repo "$TGT_REPO_FULL" \
              --body ":robot: OakAssistant AI fix run dispatched. Commits will be pushed to this PR's branch when ready."
          fi
